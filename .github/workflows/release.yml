name: Binary release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: ubuntu-latest, platform: linux-x86_64, ext: ""}
          - {os: self-hosted, platform: linux-aarch64, ext: ""}
          - {os: macos-13, platform: macos-x86_64, ext: ""}
          - {os: macos-14, platform: macos-aarch64, ext: ""}
          - {os: windows-latest, platform: windows-x86_64, ext: ".exe"}
    env:
      GH_TOKEN: ${{ secrets.LDGR_RELEASES_TOKEN }}
      RELEASE_REPO: hydra-dynamix/ldgr-releases
      SIGNING_KEY: ${{ secrets.LDGR_RELEASE_SIGNING_KEY_PEM }}
      SIGNING_KEY_ID: ${{ vars.LDGR_RELEASE_SIGNING_KEY_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --locked && cargo build --locked --release
      - name: Materialize and package
        shell: bash
        run: |
          set -euo pipefail
          version=$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')
          root="ldgr-programbench-${version}"
          mkdir -p "dist/$root/${{ matrix.platform }}"
          cargo run --locked --release -- adapter install --install-root "dist/$root"
          cp "target/release/ldgr-programbench${{ matrix.ext }}" "dist/$root/${{ matrix.platform }}/ldgr-programbench${{ matrix.ext }}"
          tar -C dist -czf "dist/$root-${{ matrix.platform }}.tar.gz" "$root"
          archive="dist/$root-${{ matrix.platform }}.tar.gz"
          digest=$(sha256sum "$archive" | awk '{print $1}')
          printf '%s' "$SIGNING_KEY" > signing.pem
          openssl pkeyutl -sign -rawin -inkey signing.pem -in "$archive" -out signature.raw
          signature=$(openssl base64 -A -in signature.raw)
          jq -n --arg key_id "$SIGNING_KEY_ID" --arg signature "$signature" '{algorithm:"Ed25519",key_id:$key_id,signature:$signature}' > "$archive.sig"
          jq -n --arg version "$version" --arg platform "${{ matrix.platform }}" --arg digest "$digest" --arg key "$SIGNING_KEY_ID" '{domain:"programbench",primary_namespace:"programbench",title:"ProgramBench historical reproduction adapter",aliases:[],classification:"open_source",source_url:"https://github.com/hydra-dynamix/ldgr-programbench",releases:[{version:$version,channel:"stable",core_compatibility:">=0.1.0, <0.2.0",platforms:[{platform:$platform,asset_url:("https://github.com/hydra-dynamix/ldgr-releases/releases/download/programbench-v"+$version+"/ldgr-programbench-"+$version+"-"+$platform+".tar.gz"),archive_root:("ldgr-programbench-"+$version),binary:"ldgr-programbench",sha256:$digest,signature_url:("https://github.com/hydra-dynamix/ldgr-releases/releases/download/programbench-v"+$version+"/ldgr-programbench-"+$version+"-"+$platform+".tar.gz.sig"),signing_key_id:$key,resource_manifest:"adapter-resources.json"}]}]}' > "dist/$root-${{ matrix.platform }}.index-entry.json"
          rm -f signing.pem signature.raw
      - uses: anchore/sbom-action@v0
        with:
          path: dist
          format: spdx-json
          output-file: dist/programbench-${{ matrix.platform }}.sbom.spdx.json
          upload-artifact: false
      - name: Publish central release
        shell: bash
        run: |
          set -euo pipefail
          version=$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')
          tag="programbench-v$version"
          gh release view "$tag" --repo "$RELEASE_REPO" >/dev/null 2>&1 || gh release create "$tag" --repo "$RELEASE_REPO" --title "ldgr-programbench v$version" --notes "Open bounded historical reproduction adapter. Not an official or clean-room benchmark."
          gh release upload "$tag" --repo "$RELEASE_REPO" dist/*-${{ matrix.platform }}* --clobber
